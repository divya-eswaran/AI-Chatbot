<!DOCTYPE html>
<html>
<head>
    <title>Register</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: #0b0f19;
            color: #e5e7eb;
            display: flex;
            height: 100vh;
        }

        .left {
            flex: 1;
            background: linear-gradient(135deg, #111827, #1f2937);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
        }

        .left h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .left p {
            color: #9ca3af;
            font-size: 16px;
            max-width: 400px;
        }

        .right {
            width: 400px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: #111827;
            padding: 35px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.5);
        }

        h2 {
            text-align: center;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border-radius: 6px;
            border: none;
            background: #1f2937;
            color: white;
        }

        input:focus {
            outline: 1px solid #6366f1;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #6366f1;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
        }

        button:hover {
            background: #4f46e5;
        }

        a {
            display: block;
            text-align: center;
            margin-top: 12px;
            color: #9ca3af;
        }

        .error {
            color: #ef4444;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="left">
    <h1>Welcome to AI Chatbot 🤖</h1>
    <p>
        Ask questions, learn faster, and explore technology with an intelligent chatbot powered by AI.
    </p>
</div>

<div class="right">
    <div class="container">
        <h2>Create Account</h2>

        <form method="POST">
            <input type="text" name="username" placeholder="Username" required>
            <input type="password" name="password" placeholder="Password" required>
            <button type="submit">Register</button>
        </form>

        <a href="/login">Already have an account? Login</a>

        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
    </div>
</div>

</body>
</html>
